<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatWeb</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #app {
      display: flex;
      width: 100%;
      max-width: 960px;
      height: 90vh;
      max-height: 700px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      background: #fff;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      border-right: 1px solid #e9edef;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    #sidebar-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #e9edef;
      background: #f0f2f5;
    }

    #sidebar-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: #111b21;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #nick-form {
      display: flex;
      gap: 6px;
    }

    #nick-input {
      flex: 1;
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      color: #111;
      outline: none;
    }

    #nick-input:focus { border-color: #25d366; }

    #nick-btn {
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 8px;
      border: none;
      background: #25d366;
      color: white;
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
    }

    #nick-btn:hover { background: #1fba58; }
    #nick-btn:disabled { background: #aaa; cursor: default; }

    #nick-status {
      font-size: 12px;
      color: #667781;
      margin-top: 7px;
      min-height: 16px;
    }

    #rooms-label {
      font-size: 11px;
      color: #667781;
      padding: 10px 16px 4px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
    }

    #rooms-list { flex: 1; overflow-y: auto; }

    .room-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f2f5;
      transition: background 0.1s;
    }

    .room-item:hover { background: #f5f6f6; }
    .room-item.active { background: #e9edef; }

    .room-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #d9fdd3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .room-info { flex: 1; min-width: 0; }

    .room-name {
      font-size: 15px;
      font-weight: 500;
      color: #111b21;
    }

    .room-preview {
      font-size: 13px;
      color: #667781;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .room-count {
      background: #25d366;
      color: white;
      border-radius: 50%;
      min-width: 20px;
      height: 20px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      padding: 0 4px;
    }

    /* ── Chat area ── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #f0f2f5;
      color: #667781;
    }

    #empty-state .emoji { font-size: 56px; }

    #empty-state p {
      font-size: 14px;
      color: #667781;
    }

    #empty-state small {
      font-size: 12px;
      color: #aaa;
      border: 1px solid #ddd;
      padding: 3px 10px;
      border-radius: 20px;
    }

    #chat-header {
      padding: 10px 16px;
      border-bottom: 1px solid #e9edef;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f0f2f5;
    }

    #chat-header-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #d9fdd3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    #chat-header-info { flex: 1; }

    #chat-header-name {
      font-size: 16px;
      font-weight: 600;
      color: #111b21;
    }

    #chat-header-sub {
      font-size: 12px;
      color: #667781;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #efeae2;
      /* WhatsApp background pattern */
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4c9b8' fill-opacity='0.3'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .msg-wrap {
      display: flex;
      flex-direction: column;
    }

    .msg-wrap.mine { align-items: flex-end; }
    .msg-wrap.other { align-items: flex-start; }

    .msg-bubble {
      max-width: 65%;
      padding: 7px 10px 4px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      position: relative;
      word-break: break-word;
    }

    .msg-wrap.mine .msg-bubble {
      background: #d9fdd3;
      color: #111b21;
      border-bottom-right-radius: 2px;
    }

    .msg-wrap.other .msg-bubble {
      background: #ffffff;
      color: #111b21;
      border-bottom-left-radius: 2px;
    }

    .msg-nick {
      font-size: 12px;
      font-weight: 600;
      color: #25d366;
      margin-bottom: 2px;
    }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 3px;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .msg-time {
      font-size: 11px;
      color: #667781;
    }

    .msg-check {
      color: #53bdeb;
      font-size: 14px;
    }

    .date-divider {
      text-align: center;
      font-size: 12px;
      color: #667781;
      background: rgba(255,255,255,0.85);
      padding: 4px 12px;
      border-radius: 8px;
      align-self: center;
      margin: 8px 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }

    /* ── Input area ── */
    #input-area {
      padding: 10px 14px;
      border-top: 1px solid #e9edef;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f0f2f5;
    }

    #msg-input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 24px;
      border: none;
      background: #fff;
      color: #111b21;
      font-size: 15px;
      outline: none;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }

    #msg-input::placeholder { color: #aaa; }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #25d366;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      transition: background 0.15s;
    }

    #send-btn:hover { background: #1fba58; }
    #send-btn:disabled { background: #ccc; cursor: default; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  </style>
</head>
<body>

<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>💬 ChatWeb</h2>
      <div id="nick-form">
        <input id="nick-input" type="text" placeholder="Seu apelido..." maxlength="20" />
        <button id="nick-btn">Entrar</button>
      </div>
      <div id="nick-status">Escolha um apelido para participar.</div>
    </div>
    <div id="rooms-label">Salas</div>
    <div id="rooms-list"></div>
  </div>

  <!-- Chat area -->
  <div id="chat-area">
    <div id="empty-state">
      <div class="emoji">💬</div>
      <p>Selecione uma sala para começar</p>
      <small>Mensagens expiram automaticamente em 24h</small>
    </div>
  </div>

</div>

<script>
  const ROOMS = [
    { id: 'geral',      name: 'Geral',        icon: '💬' },
    { id: 'tecnologia', name: 'Tecnologia',   icon: '💻' },
    { id: 'memes',      name: 'Memes & Humor',icon: '😂' },
    { id: 'noticias',   name: 'Notícias',     icon: '📰' },
  ];

  const TTL = 24 * 60 * 60 * 1000; // 24 horas em ms
  let nickname = '';
  let currentRoom = null;
  let pollInterval = null;
  let lastMsgCount = 0;

  /* ── Storage helpers ── */
  function storageKey(roomId) { return `chatweb_room_${roomId}`; }

  function getMessages(roomId) {
    try {
      const raw = localStorage.getItem(storageKey(roomId));
      if (!raw) return [];
      const msgs = JSON.parse(raw);
      const now = Date.now();
      return msgs.filter(m => now - m.ts < TTL);
    } catch { return []; }
  }

  function saveMessages(roomId, msgs) {
    try {
      const now = Date.now();
      const clean = msgs.filter(m => now - m.ts < TTL);
      localStorage.setItem(storageKey(roomId), JSON.stringify(clean));
    } catch {}
  }

  function addMessage(roomId, text) {
    const msgs = getMessages(roomId);
    msgs.push({
      nick: nickname,
      text: text,
      ts: Date.now(),
      id: Math.random().toString(36).slice(2)
    });
    saveMessages(roomId, msgs);
  }

  /* ── Formatters ── */
  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const today = new Date();
    const yest  = new Date(); yest.setDate(yest.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'Hoje';
    if (d.toDateString() === yest.toDateString())  return 'Ontem';
    return d.toLocaleDateString('pt-BR');
  }

  /* ── Render rooms sidebar ── */
  function renderRooms() {
    const list = document.getElementById('rooms-list');
    list.innerHTML = '';
    ROOMS.forEach(room => {
      const msgs = getMessages(room.id);
      const last = msgs[msgs.length - 1];
      const div  = document.createElement('div');
      div.className = 'room-item' + (currentRoom === room.id ? ' active' : '');

      div.innerHTML = `
        <div class="room-icon">${room.icon}</div>
        <div class="room-info">
          <div class="room-name">${room.name}</div>
          <div class="room-preview">
            ${last
              ? `<strong>${last.nick}:</strong> ${last.text}`
              : 'Nenhuma mensagem ainda'}
          </div>
        </div>
        ${msgs.length ? `<div class="room-count">${msgs.length}</div>` : ''}
      `;

      div.addEventListener('click', () => openRoom(room.id));
      list.appendChild(div);
    });
  }

  /* ── Open a room ── */
  function openRoom(roomId) {
    currentRoom = roomId;
    lastMsgCount = 0;
    renderRooms();

    const room = ROOMS.find(r => r.id === roomId);
    const chatArea = document.getElementById('chat-area');

    chatArea.innerHTML = `
      <div id="chat-header">
        <div id="chat-header-icon">${room.icon}</div>
        <div id="chat-header-info">
          <div id="chat-header-name">${room.name}</div>
          <div id="chat-header-sub">Sala pública · mensagens expiram em 24h</div>
        </div>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <input
          id="msg-input"
          type="text"
          placeholder="${nickname ? 'Digite uma mensagem...' : 'Defina um apelido para enviar mensagens'}"
          ${!nickname ? 'disabled' : ''}
          maxlength="500"
          autocomplete="off"
        />
        <button id="send-btn" ${!nickname ? 'disabled' : ''}>&#9658;</button>
      </div>
    `;

    renderMessages(true);

    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMsg();
    });
    document.getElementById('send-btn').addEventListener('click', sendMsg);
    document.getElementById('msg-input').focus();

    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(() => {
      renderMessages(false);
      renderRooms();
    }, 2000);
  }

  /* ── Render messages ── */
  function renderMessages(forceScroll = true) {
    const container = document.getElementById('messages');
    if (!container) return;

    const msgs = getMessages(currentRoom);
    const shouldScroll = forceScroll || msgs.length !== lastMsgCount;
    lastMsgCount = msgs.length;

    let lastDate = '';
    let html = '';

    msgs.forEach(m => {
      const dateLabel = formatDate(m.ts);
      if (dateLabel !== lastDate) {
        html += `<div class="date-divider">${dateLabel}</div>`;
        lastDate = dateLabel;
      }

      const mine = m.nick === nickname;
      html += `
        <div class="msg-wrap ${mine ? 'mine' : 'other'}">
          <div class="msg-bubble">
            ${!mine ? `<div class="msg-nick">${escapeHtml(m.nick)}</div>` : ''}
            ${escapeHtml(m.text)}
            <div class="msg-meta">
              <span class="msg-time">${formatTime(m.ts)}</span>
              ${mine ? '<span class="msg-check">✓✓</span>' : ''}
            </div>
          </div>
        </div>
      `;
    });

    if (!msgs.length) {
      html = `<div style="text-align:center;color:#667781;font-size:13px;margin-top:32px;
                          background:rgba(255,255,255,.7);padding:10px 20px;border-radius:8px;
                          align-self:center;">
                Nenhuma mensagem ainda.<br>Seja o primeiro a escrever!
              </div>`;
    }

    container.innerHTML = html;
    if (shouldScroll) container.scrollTop = container.scrollHeight;
  }

  /* ── Send a message ── */
  function sendMsg() {
    if (!nickname) return;
    const inp  = document.getElementById('msg-input');
    const text = inp.value.trim();
    if (!text || !currentRoom) return;
    addMessage(currentRoom, text);
    inp.value = '';
    renderMessages(true);
    renderRooms();
  }

  /* ── Set nickname ── */
  function setNickname() {
    const val = document.getElementById('nick-input').value.trim();
    if (!val) {
      document.getElementById('nick-status').textContent = 'Digite um apelido válido.';
      return;
    }
    nickname = val;
    document.getElementById('nick-status').textContent = `Olá, ${nickname}! Escolha uma sala ao lado.`;
    document.getElementById('nick-btn').textContent = '✓';
    document.getElementById('nick-btn').disabled = true;
    document.getElementById('nick-input').disabled = true;

    if (currentRoom) openRoom(currentRoom);
    renderRooms();
  }

  /* ── Escape HTML to avoid XSS ── */
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Init ── */
  document.getElementById('nick-btn').addEventListener('click', setNickname);
  document.getElementById('nick-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') setNickname();
  });

  renderRooms();
</script>

</body>
</html>
