<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatWeb</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #app {
      display: flex;
      width: 100%;
      max-width: 960px;
      height: 90vh;
      max-height: 700px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      background: #fff;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      border-right: 1px solid #e9edef;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    #sidebar-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #e9edef;
      background: #f0f2f5;
    }

    #sidebar-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: #111b21;
      margin-bottom: 12px;
    }

    #nick-form { display: flex; gap: 6px; }

    #nick-input {
      flex: 1;
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      color: #111;
      outline: none;
    }
    #nick-input:focus { border-color: #25d366; }

    #nick-btn {
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 8px;
      border: none;
      background: #25d366;
      color: white;
      cursor: pointer;
      font-weight: 500;
    }
    #nick-btn:hover { background: #1fba58; }
    #nick-btn:disabled { background: #aaa; cursor: default; }

    #nick-status {
      font-size: 12px;
      color: #667781;
      margin-top: 7px;
      min-height: 16px;
    }

    #rooms-label {
      font-size: 11px;
      color: #667781;
      padding: 10px 16px 4px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
    }

    #rooms-list { flex: 1; overflow-y: auto; }

    .room-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f2f5;
      transition: background 0.1s;
    }
    .room-item:hover { background: #f5f6f6; }
    .room-item.active { background: #e9edef; }

    .room-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #d9fdd3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .room-info { flex: 1; min-width: 0; }
    .room-name { font-size: 15px; font-weight: 500; color: #111b21; }
    .room-preview {
      font-size: 13px;
      color: #667781;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* ── Chat area ── */
    #chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #f0f2f5;
      color: #667781;
    }
    #empty-state .emoji { font-size: 56px; }
    #empty-state p { font-size: 14px; color: #667781; }
    #empty-state small {
      font-size: 12px;
      color: #aaa;
      border: 1px solid #ddd;
      padding: 3px 10px;
      border-radius: 20px;
    }

    #chat-header {
      padding: 10px 16px;
      border-bottom: 1px solid #e9edef;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f0f2f5;
    }
    #chat-header-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #d9fdd3;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    #chat-header-info { flex: 1; }
    #chat-header-name { font-size: 16px; font-weight: 600; color: #111b21; }
    #chat-header-sub { font-size: 12px; color: #667781; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #efeae2;
    }

    .msg-wrap { display: flex; flex-direction: column; }
    .msg-wrap.mine { align-items: flex-end; }
    .msg-wrap.other { align-items: flex-start; }

    .msg-bubble {
      max-width: 65%;
      padding: 7px 10px 4px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg-wrap.mine .msg-bubble {
      background: #d9fdd3;
      color: #111b21;
      border-bottom-right-radius: 2px;
    }
    .msg-wrap.other .msg-bubble {
      background: #ffffff;
      color: #111b21;
      border-bottom-left-radius: 2px;
    }

    .msg-nick { font-size: 12px; font-weight: 600; color: #25d366; margin-bottom: 2px; }
    .msg-meta { display: flex; align-items: center; gap: 3px; justify-content: flex-end; margin-top: 2px; }
    .msg-time { font-size: 11px; color: #667781; }
    .msg-check { color: #53bdeb; font-size: 13px; }

    .date-divider {
      text-align: center;
      font-size: 12px;
      color: #667781;
      background: rgba(255,255,255,0.85);
      padding: 4px 12px;
      border-radius: 8px;
      align-self: center;
      margin: 8px 0;
    }

    .loading-msg {
      text-align: center;
      font-size: 13px;
      color: #667781;
      margin-top: 20px;
      align-self: center;
    }

    /* ── Input area ── */
    #input-area {
      padding: 10px 14px;
      border-top: 1px solid #e9edef;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f0f2f5;
    }

    #msg-input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 24px;
      border: none;
      background: #fff;
      color: #111b21;
      font-size: 15px;
      outline: none;
    }
    #msg-input::placeholder { color: #aaa; }

    #send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: #25d366;
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #1fba58; }
    #send-btn:disabled { background: #ccc; cursor: default; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  </style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>💬 ChatWeb</h2>
      <div id="nick-form">
        <input id="nick-input" type="text" placeholder="Seu apelido..." maxlength="20" />
        <button id="nick-btn">Entrar</button>
      </div>
      <div id="nick-status">Escolha um apelido para participar.</div>
    </div>
    <div id="rooms-label">Salas</div>
    <div id="rooms-list"></div>
  </div>

  <div id="chat-area">
    <div id="empty-state">
      <div class="emoji">💬</div>
      <p>Selecione uma sala para começar</p>
      <small>Mensagens expiram automaticamente em 24h</small>
    </div>
  </div>
</div>

<!-- Firebase SDK (compat version — funciona direto no browser sem bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  /* ── Firebase config ── */
  const firebaseConfig = {
    apiKey: "AIzaSyCKs6rnTlOoTiWXQLleoKQycpTRS25mHBg",
    authDomain: "chatweb-4c13b.firebaseapp.com",
    projectId: "chatweb-4c13b",
    storageBucket: "chatweb-4c13b.firebasestorage.app",
    messagingSenderId: "1024726923790",
    appId: "1:1024726923790:web:3635c8927dbfbe78ddda5f"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  /* ── App state ── */
  const ROOMS = [
    { id: 'geral',      name: 'Geral',         icon: '💬' },
    { id: 'tecnologia', name: 'Tecnologia',    icon: '💻' },
    { id: 'memes',      name: 'Memes & Humor', icon: '😂' },
    { id: 'noticias',   name: 'Notícias',      icon: '📰' },
  ];

  const TTL_MS = 24 * 60 * 60 * 1000; // 24h
  let nickname    = '';
  let currentRoom = null;
  let unsubscribe = null; // listener do Firestore

  /* ── Helpers ── */
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  }

  function formatDate(ts) {
    const d    = new Date(ts);
    const now  = new Date();
    const yest = new Date(); yest.setDate(now.getDate() - 1);
    if (d.toDateString() === now.toDateString())  return 'Hoje';
    if (d.toDateString() === yest.toDateString()) return 'Ontem';
    return d.toLocaleDateString('pt-BR');
  }

  /* ── Render sidebar rooms ── */
  async function renderRooms() {
    const list = document.getElementById('rooms-list');
    list.innerHTML = '';

    for (const room of ROOMS) {
      // Busca última mensagem de cada sala
      let preview = 'Nenhuma mensagem ainda';
      try {
        const snap = await db.collection(`rooms/${room.id}/messages`)
          .orderBy('ts', 'desc').limit(1).get();
        if (!snap.empty) {
          const d = snap.docs[0].data();
          preview = `${d.nick}: ${d.text}`;
        }
      } catch {}

      const div = document.createElement('div');
      div.className = 'room-item' + (currentRoom === room.id ? ' active' : '');
      div.innerHTML = `
        <div class="room-icon">${room.icon}</div>
        <div class="room-info">
          <div class="room-name">${room.name}</div>
          <div class="room-preview">${escapeHtml(preview)}</div>
        </div>
      `;
      div.addEventListener('click', () => openRoom(room.id));
      list.appendChild(div);
    }
  }

  /* ── Open a room ── */
  function openRoom(roomId) {
    // Para o listener anterior
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }

    currentRoom = roomId;
    renderRooms();

    const room = ROOMS.find(r => r.id === roomId);
    const chatArea = document.getElementById('chat-area');

    chatArea.innerHTML = `
      <div id="chat-header">
        <div id="chat-header-icon">${room.icon}</div>
        <div id="chat-header-info">
          <div id="chat-header-name">${room.name}</div>
          <div id="chat-header-sub">Sala pública · mensagens expiram em 24h · tempo real 🟢</div>
        </div>
      </div>
      <div id="messages"><div class="loading-msg">Carregando mensagens...</div></div>
      <div id="input-area">
        <input
          id="msg-input"
          type="text"
          placeholder="${nickname ? 'Digite uma mensagem...' : 'Defina um apelido para enviar mensagens'}"
          ${!nickname ? 'disabled' : ''}
          maxlength="500"
          autocomplete="off"
        />
        <button id="send-btn" ${!nickname ? 'disabled' : ''}>&#9658;</button>
      </div>
    `;

    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMsg();
    });
    document.getElementById('send-btn').addEventListener('click', sendMsg);
    document.getElementById('msg-input').focus();

    // Listener em tempo real — últimas 100 msgs das últimas 24h
    const cutoff = new Date(Date.now() - TTL_MS);
    unsubscribe = db.collection(`rooms/${roomId}/messages`)
      .where('ts', '>', cutoff)
      .orderBy('ts', 'asc')
      .limit(100)
      .onSnapshot(snapshot => {
        renderMessages(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
        renderRooms();
      }, err => {
        console.error('Firestore error:', err);
      });
  }

  /* ── Render messages ── */
  function renderMessages(msgs) {
    const container = document.getElementById('messages');
    if (!container) return;

    if (!msgs.length) {
      container.innerHTML = `<div class="loading-msg">Nenhuma mensagem ainda.<br>Seja o primeiro a escrever! 👋</div>`;
      return;
    }

    let lastDate = '';
    let html = '';

    msgs.forEach(m => {
      const ts = m.ts instanceof Date ? m.ts : m.ts.toDate();
      const dateLabel = formatDate(ts);
      if (dateLabel !== lastDate) {
        html += `<div class="date-divider">${dateLabel}</div>`;
        lastDate = dateLabel;
      }
      const mine = m.nick === nickname;
      html += `
        <div class="msg-wrap ${mine ? 'mine' : 'other'}">
          <div class="msg-bubble">
            ${!mine ? `<div class="msg-nick">${escapeHtml(m.nick)}</div>` : ''}
            ${escapeHtml(m.text)}
            <div class="msg-meta">
              <span class="msg-time">${formatTime(ts)}</span>
              ${mine ? '<span class="msg-check">✓✓</span>' : ''}
            </div>
          </div>
        </div>
      `;
    });

    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
  }

  /* ── Send message ── */
  async function sendMsg() {
    if (!nickname) return;
    const inp  = document.getElementById('msg-input');
    const text = inp.value.trim();
    if (!text || !currentRoom) return;

    inp.value = '';
    inp.focus();

    try {
      await db.collection(`rooms/${currentRoom}/messages`).add({
        nick: nickname,
        text: text,
        ts:   firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch (err) {
      console.error('Erro ao enviar:', err);
      inp.value = text; // devolve o texto se falhar
    }
  }

  /* ── Set nickname ── */
  function setNickname() {
    const val = document.getElementById('nick-input').value.trim();
    if (!val) {
      document.getElementById('nick-status').textContent = 'Digite um apelido válido.';
      return;
    }
    nickname = val;
    document.getElementById('nick-status').textContent = `Olá, ${nickname}! Escolha uma sala. 👋`;
    document.getElementById('nick-btn').textContent = '✓';
    document.getElementById('nick-btn').disabled = true;
    document.getElementById('nick-input').disabled = true;
    if (currentRoom) openRoom(currentRoom);
    renderRooms();
  }

  /* ── Init ── */
  document.getElementById('nick-btn').addEventListener('click', setNickname);
  document.getElementById('nick-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') setNickname();
  });

  renderRooms();
</script>
</body>
</html>
